name: Daily Panama & Costa Rica News Scan

on:
  schedule:
    - cron: '0 13 * * *'  # 1 PM UTC = 7 AM Central (Panama/CR time)
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate news page
        run: python generate_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pa_cr.html
          git diff --staged --quiet || git commit -m "chore: daily news scan $(date -u '+%Y-%m-%d')"
          git push
